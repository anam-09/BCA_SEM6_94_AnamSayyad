<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.login-box{
width:300px;
margin:120px auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form action="login.php" method="post">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
